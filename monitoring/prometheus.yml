global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "prometheus-alerts.yml"

scrape_configs:
  - job_name: 'auto-trade-system'
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8000']
    scrape_interval: 10s
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
