[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -ra
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (module interactions)
    simulation: Simulation tests (synthetic data)
    paper_trading: Paper trading tests (demo accounts)
    shadow_mode: Shadow mode tests (live data, no execution)
    slow: Slow-running tests (>10s)
    must_pass: Critical tests that MUST pass before production deployment
    performance: Performance benchmark tests
    chaos: Chaos engineering tests (fault injection, crash recovery)
    load: Load testing benchmarks (concurrent users, HFT scenarios)
