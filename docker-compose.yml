version: '3.8'

# =============================================================================
# SECURITY WARNING
# =============================================================================
# This file uses environment variables for sensitive credentials.
# NEVER hardcode passwords in this file!
#
# Before running:
# 1. Copy .env.example to .env
# 2. Set DB_PASSWORD and GRAFANA_PASSWORD to strong, unique values
# 3. NEVER commit .env to version control
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    environment:
      # SECURITY: Force users to set strong password in .env file
      POSTGRES_USER: ${DB_USER:-trading}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD to a strong password in .env before deploying}
      POSTGRES_DB: ${DB_NAME:-vmassit}
      # PostgreSQL configuration for better connection handling
      POSTGRES_MAX_CONNECTIONS: "100"
      POSTGRES_SHARED_BUFFERS: "256MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "768MB"
      POSTGRES_WORK_MEM: "4MB"
      POSTGRES_MAINTENANCE_WORK_MEM: "64MB"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trading} -d ${DB_NAME:-vmassit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # Give PostgreSQL time to initialize
    restart: unless-stopped
    networks:
      - trading-network
    # Ensure PostgreSQL listens on all interfaces
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "max_connections=100"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trading-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - trading-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    ports:
      - "3000:3000"
    environment:
      # SECURITY: Force users to set strong password in .env file
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD to a strong password in .env before deploying}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - trading-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  loki:
    image: grafana/loki:latest
    container_name: trading-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - trading-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  promtail:
    image: grafana/promtail:latest
    container_name: trading-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - trading-network

  # =============================================================================
  # TRADING BOT SERVICE (API Control Plane)
  # =============================================================================
  # FastAPI application serving REST API, WebSocket, and dashboard
  # Handles: Signal generation, trade proposals, monitoring, admin controls
  # =============================================================================
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot-api
    environment:
      # Database configuration
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-trading}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-vmassit}
      - REDIS_URL=redis://redis:6379/0
      
      # Exchange configuration
      - ACTIVE_EXCHANGE=${ACTIVE_EXCHANGE:-bybit}
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
      - BYBIT_TESTNET=${BYBIT_TESTNET:-true}
      
      # Execution configuration
      - EXECUTION_MODE=${EXECUTION_MODE:-semi-auto}
      - ENABLED_TRADING_SYMBOLS=${ENABLED_TRADING_SYMBOLS:-XAUUSDT}
      
      # Telegram notifications
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      
      # Self-healing agent thresholds
      - MAX_EXECUTION_RETRIES=${MAX_EXECUTION_RETRIES:-3}
      - MAX_SLIPPAGE_PCT=${MAX_SLIPPAGE_PCT:-0.5}
      - MAX_API_LATENCY_MS=${MAX_API_LATENCY_MS:-5000}
      - MAX_DRAWDOWN_PCT=${MAX_DRAWDOWN_PCT:-5.0}
      
      # Reconciliation settings
      - RECONCILIATION_INTERVAL_SECONDS=${RECONCILIATION_INTERVAL_SECONDS:-60}
      - RECONCILIATION_AUTO_REPAIR=${RECONCILIATION_AUTO_REPAIR:-true}
      
      # Circuit breaker config
      - CIRCUIT_BREAKER_FAILURE_THRESHOLD=${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}
      - CIRCUIT_BREAKER_RECOVERY_TIMEOUT=${CIRCUIT_BREAKER_RECOVERY_TIMEOUT:-300}
      
      # Logging configuration
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Give app time to initialize
    restart: unless-stopped
    networks:
      - trading-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # =============================================================================
  # WORKER SERVICE (Background Tasks)
  # =============================================================================
  # Handles: Position monitoring, reconciliation, session scheduling,
  #          news guard, background data sync, learning updates
  # Runs independently from API for better isolation and scalability
  # =============================================================================
  trading-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot-worker
    environment:
      # Database configuration
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-trading}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-vmassit}
      - REDIS_URL=redis://redis:6379/0
      
      # Exchange configuration
      - ACTIVE_EXCHANGE=${ACTIVE_EXCHANGE:-bybit}
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
      - BYBIT_TESTNET=${BYBIT_TESTNET:-true}
      
      # Worker-specific configuration
      - WORKER_MODE=true
      - ENABLED_TRADING_SYMBOLS=${ENABLED_TRADING_SYMBOLS:-XAUUSDT}
      
      # Self-healing agent thresholds
      - MAX_EXECUTION_RETRIES=${MAX_EXECUTION_RETRIES:-3}
      - MAX_SLIPPAGE_PCT=${MAX_SLIPPAGE_PCT:-0.5}
      - MAX_API_LATENCY_MS=${MAX_API_LATENCY_MS:-5000}
      - MAX_DRAWDOWN_PCT=${MAX_DRAWDOWN_PCT:-5.0}
      
      # Reconciliation settings
      - RECONCILIATION_INTERVAL_SECONDS=${RECONCILIATION_INTERVAL_SECONDS:-60}
      - RECONCILIATION_AUTO_REPAIR=${RECONCILIATION_AUTO_REPAIR:-true}
      
      # Circuit breaker config
      - CIRCUIT_BREAKER_FAILURE_THRESHOLD=${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}
      - CIRCUIT_BREAKER_RECOVERY_TIMEOUT=${CIRCUIT_BREAKER_RECOVERY_TIMEOUT:-300}
      
      # Logging configuration
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trading-bot:
        condition: service_healthy  # Wait for API to be ready
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - trading-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 384M
    # Override CMD to run worker instead of API
    command: ["python", "app/worker_gold_bot.py"]

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  trading-network:
    driver: bridge
