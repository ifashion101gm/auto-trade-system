---
# PostgreSQL — StatefulSet (ordered, stable network identity, PVC retained on delete)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: trading
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: trading-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: trading-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: DB_PASSWORD
          args:
            - postgres
            - -c
            - listen_addresses=*
            - -c
            - max_connections=100
            - -c
            - shared_buffers=256MB
            - -c
            - effective_cache_size=768MB
            - -c
            - work_mem=4MB
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "trading", "-d", "vmassit"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "trading", "-d", "vmassit"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
# Headless service for StatefulSet stable DNS
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: trading
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless — pods reachable as postgres-0.postgres.trading.svc
