# =============================================================================
# SECRETS TEMPLATE — do NOT commit with real values.
# Populate via:
#   kubectl create secret generic trading-secrets -n trading \
#     --from-literal=DB_PASSWORD='<strong-password>' \
#     --from-literal=BYBIT_API_KEY='...' \
#     --from-literal=BYBIT_API_SECRET='...' \
#     --from-literal=BINANCE_API_KEY='...' \
#     --from-literal=BINANCE_API_SECRET='...' \
#     --from-literal=ANTHROPIC_API_KEY='...' \
#     --from-literal=ADMIN_API_KEY='...' \
#     --from-literal=TELEGRAM_BOT_TOKEN='...' \
#     --from-literal=TELEGRAM_CHAT_ID='...'
#
# Or via Vault Agent sidecar injection (recommended for production).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: trading-secrets
  namespace: trading
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"
  BYBIT_API_KEY: "REPLACE_ME"
  BYBIT_API_SECRET: "REPLACE_ME"
  BINANCE_API_KEY: "REPLACE_ME"          # optional — enables CLOSE failover
  BINANCE_API_SECRET: "REPLACE_ME"       # optional — enables CLOSE failover
  ANTHROPIC_API_KEY: "REPLACE_ME"
  ADMIN_API_KEY: "REPLACE_ME"            # min 16 chars, must not be 'CHANGE_ME_IN_PRODUCTION'
  TELEGRAM_BOT_TOKEN: "REPLACE_ME"
  TELEGRAM_CHAT_ID: "REPLACE_ME"
